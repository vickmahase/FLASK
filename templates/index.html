<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
        }
        button {
            margin-top: 12px;
            padding: 10px 24px;
            background-color: #0062ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0050d0;
        }
        #output {
            margin-top: 20px;
            padding: 16px;
            background-color: #f0f4ff;
            border-left: 4px solid #0062ff;
            border-radius: 4px;
            font-size: 15px;
            min-height: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Emotion Detector</h1>
        <p>Enter text below to detect emotions using Watson NLP:</p>
        <textarea id="textToAnalyze" rows="5" placeholder="Type your text here..."></textarea>
        <br>
        <button onclick="runEmotionAnalysis()">Analyze Emotion</button>
        <div id="output"></div>
    </div>
    <script src="/static/mywebscript.js"></script>
</body>
</html>
